# Render.com - Deploy do backend FastAPI (gratuito)
# 1. Va em https://dashboard.render.com/blueprint
# 2. Connect o repo GitHub
# 3. Render detecta este arquivo e cria o servico automaticamente

services:
  - type: web
    name: dashboard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false  # preencha no painel do Render
      - key: SUPABASE_KEY
        sync: false  # preencha no painel do Render
    plan: free
